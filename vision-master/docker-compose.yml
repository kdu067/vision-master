version: '3.8'

services:
  # Serviço Ollama para modelos de linguagem
  ollama:
    image: ollama/ollama:latest
    container_name: agrovision-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - agrovision-network

  # Serviço AgroVision FastAPI
  agrovision:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agrovision-app
    ports:
      - "8000:8000"
    volumes:
      - ./static/captures:/app/static/captures
      - ./detections.db:/app/detections.db
      - ./logs:/app/logs
    environment:
      - OLLAMA_URL=http://ollama:11434/api/chat
      - OLLAMA_MODEL=llama3
      - OLLAMA_TIMEOUT=120
      - OLLAMA_KEEP_ALIVE=30m
      - AGENT_EVENT_LIMIT=12
      - CAMERA_SOURCE=https://wzmedia.dot.ca.gov/D11/C214_SB_5_at_Via_De_San_Ysidro.stream/playlist.m3u8
      - CAMERA_RECONNECT_SECONDS=5
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - agrovision-network
    restart: unless-stopped

  # Serviço Nginx para proxy reverso (opcional)
  nginx:
    image: nginx:alpine
    container_name: agrovision-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - agrovision
    networks:
      - agrovision-network
    restart: unless-stopped

volumes:
  ollama_data:
    driver: local

networks:
  agrovision-network:
    driver: bridge
